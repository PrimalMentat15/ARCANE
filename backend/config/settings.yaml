# ARCANE Global Configuration

simulation:
  step_duration_seconds: 1        # Real-time delay between steps (0 = max speed)
  sim_time_per_step_minutes: 20   # How many in-sim minutes each step represents
  max_steps: 0                    # 0 = unlimited (interactive mode)

  # Agent roster for this run — references persona IDs from personas/ directory
  agents:
    - persona: marcus_webb
      id: agent_deviant_1
      starting_location: arthur_burtons_apt

    - persona: sarah_chen
      id: agent_benign_1
      starting_location: isabella_rodriguezs_apt
      relationships:
        - agent_id: agent_benign_2
          type: neighbor
          label: "Dorothy, a kind elderly neighbor"

    - persona: dorothy_finch
      id: agent_benign_2
      starting_location: moore_familys_house
      relationships:
        - agent_id: agent_benign_1
          type: neighbor
          label: "Sarah, a nice young woman next door"

# ── Model Profiles ──────────────────────────────────────────────────
# Define once, reference by name.  Only one model is loaded at a time
# in LM Studio, so all roles share the same profile.

model_profiles:
  qwen:
    provider: local
    model: qwen3.5-9b
  deepseek:
    provider: local
    model: deepseek-r1-distill-llama-8b
  llama8b:
    provider: local
    model: meta-llama-3.1-8b-instruct
  # Cloud options (uncomment to use)
  # gemini_flash:
  #   provider: gemini
  #   model: gemini-2.0-flash-lite
  # gemini_25:
  #   provider: gemini
  #   model: gemini-2.5-flash-lite

# ── Active LLM Assignments ─────────────────────────────────────────
# Change the 'profile' value to switch all agents to a different model.
# You can also use inline provider/model for one-off overrides.

llm:
  benign_agents:
    profile: llama8b                 # ← swap to deepseek / llama8b etc.
  deviant_agents:
    profile: llama8b
  reflection:
    profile: llama8b

  # -- Inline override example (no profile needed) --
  # benign_agents:
  #   provider: gemini
  #   model: gemini-2.0-flash-lite

# Local LLM server configuration (LM Studio / Ollama / vLLM)
local_llm:
  base_url: http://localhost:1234/v1    # LM Studio default
  timeout: 120                           # Seconds — increase for CPU-only inference
  # embedding_model: null               # Set if you load an embedding model

memory:
  retrieval_weights:
    recency: 1.0
    importance: 1.0
    relevance: 1.0
  reflection_interval_steps: 10       # Reflect every N steps
  max_memories_retrieved: 10

# Conversation context settings
conversation:
  summary_interval: 6                  # Summarize conversation every N exchanges
  max_recent_messages: 8               # Recent messages to include in prompt
  full_transcript_threshold: 10        # Use full transcript below this many exchanges
  trust_eval_interval: 2               # Evaluate trust every N-th incoming message (reduces inflation)

world:
  default_map: the_ville
  vision_radius: 4                    # Tiles an agent can perceive

channels:
  sms_delivery_delay_steps: 1         # Steps before SMS is delivered
  email_delivery_delay_steps: 2       # Steps before email is delivered
  dm_delivery_delay_steps: 1          # Steps before DM is delivered

recording:
  enabled: true                       # Auto-record every sim run for replay
  dir: storage/recordings             # Directory for .arcane recording files
  save_interval: 5                    # Auto-save every N steps (0 = only on end)

logging:
  level: INFO
  log_dir: storage/logs
  event_log_format: json              # json or csv
  log_every_step: true                # Active logs for every step

visualization:
  pixel_art_scale: 2                  # Scale factor for pixel art sprites
  show_interaction_log: true
  show_metrics_dashboard: true
  dark_mode: true
