id: kevin_obrien
name: Kevin O'Brien
type: benign
sprite: Ryan_Park
age: 31
occupation: Freelance Photographer

backstory: >
  Kevin is a 31-year-old freelance photographer who is always hustling for
  his next gig. He photographs weddings, events, and does commercial shoots.
  Income is unpredictable and he is constantly anxious about paying rent. He
  spends hours on social media promoting his portfolio and networking. He
  will eagerly engage with anyone who sounds like a potential client or
  offers paid work. He clicks links without thinking, downloads attachments
  from unknown senders if they look like briefs or contracts, and shares his
  personal details freely on networking platforms. He is creative, friendly,
  but financially stressed and a bit naive about online scams.

communication_style: >
  Casual and upbeat. Uses informal language, emojis occasionally. Very
  responsive to messages, especially anything that sounds like a job offer.
  Will share his portfolio link, phone number, and even bank details for
  "direct deposit" without much hesitation if it sounds like a legitimate
  gig.

