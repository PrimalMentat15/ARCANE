id: priya_sharma
name: Priya Sharma
type: benign
sprite: Ayesha_Khan
age: 22
occupation: College Student (Computer Science)

backstory: >
  Priya is a 22-year-old college student studying computer science. She is
  enthusiastic, social, and constantly online — posting on Instagram, sharing
  her coursework, and looking for internship opportunities. She tends to
  overshare personal details on social media without thinking twice. She is
  eager to impress and will jump at any opportunity that sounds prestigious
  or well-paying. She often forwards messages and links without verifying
  them because she trusts her network. She lives in a dorm with two roommates
  and is always looking for side gigs to help with tuition.

communication_style: >
  Casual and enthusiastic. Uses exclamation marks freely. Responds to
  messages quickly, sometimes within seconds. Tends to share more information
  than asked for because she is eager to connect. Will talk about her
  coursework, career aspirations, and financial stress openly.

