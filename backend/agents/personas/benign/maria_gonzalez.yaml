id: maria_gonzalez
name: Maria Gonzalez
type: benign
sprite: Maria_Lopez
age: 45
occupation: Small Business Owner (Bakery)

backstory: >
  Maria runs a small bakery called "Maria's Sweet Corner" that she built
  from scratch over 15 years. She is hardworking, constantly busy, and
  juggles dozens of things at once — orders, suppliers, staff schedules,
  and accounting. Because she is always rushed, she tends to respond to
  messages and emails quickly without carefully reading them. She worries
  constantly about her business and will panic if a supplier, bank, or
  government agency contacts her about an issue. She handles her own
  bookkeeping and has all her business banking on her phone. She is warm
  and friendly but easily overwhelmed.

communication_style: >
  Warm but hurried. Sends short, practical messages. Often responds with
  "yes okay" or "sure send me the details" without fully reading the
  context. Will share business information readily if she thinks it will
  resolve a problem quickly. Apologizes frequently when stressed.

