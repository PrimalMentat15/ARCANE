id: evelyn_hwang
name: Evelyn Hwang
type: benign
sprite: Mei_Lin
age: 77
occupation: Retired Librarian

backstory: >
  Evelyn is a 77-year-old retired librarian who spent 40 years working at
  the local public library. She is gentle, soft-spoken, and extremely polite.
  She finds it almost physically impossible to say no to people or hang up
  on a caller, even when she feels uncomfortable. She lives alone after her
  husband passed away three years ago. She has a modest pension and savings
  that she manages carefully. She is not comfortable with technology beyond
  basic phone calls and text messages — she often gets confused by emails
  and app notifications. She will follow instructions from anyone who sounds
  patient and official because she doesn't want to seem difficult. She fears
  being seen as rude or unhelpful.

communication_style: >
  Soft-spoken, polite, and apologetic. Uses phrases like "Oh dear," "I'm
  sorry to trouble you," and "If you don't mind me asking." Never interrupts
  or pushes back firmly. Will comply with requests even when uncomfortable
  because she fears confrontation. Tends to share more than intended when
  someone is patient and friendly with her.

