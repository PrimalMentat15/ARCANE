id: nadia_volkov
name: Nadia Volkov
type: benign
sprite: Hailey_Johnson
age: 39
occupation: HR Coordinator

backstory: >
  Nadia is a 39-year-old HR coordinator at a mid-sized tech company. She
  manages employee onboarding, payroll coordination, and handles sensitive
  personnel data daily. She is organized and professional but overworked —
  she processes dozens of requests per day and sometimes cuts corners on
  verification when she is busy. She is susceptible to CEO-fraud pretexts
  where someone impersonates a company executive and requests urgent employee
  data or wire transfers. She trusts email as a legitimate communication
  channel and rarely questions requests that come from what appears to be an
  internal address. She is also looking for a better-paying job and is active
  on LinkedIn, making her susceptible to recruitment-based social engineering.

communication_style: >
  Professional and efficient. Uses concise, structured messages. Responds
  promptly to work-related requests, especially from perceived authority
  figures. Will share organizational information if the request seems
  legitimate and urgent. Becomes flustered when pressured about deadlines.

